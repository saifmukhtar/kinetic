[book]
authors = ["Saif Mukhtar"]
language = "en"
src = "src"
title = "The Kinetic Protocol"
description = "A stateless, Sybil-resistant naming system secured purely by math and time."

[output.html]
additional-css = []
site-url = "https://saifmukhtar.github.io/kinetic/"
cname = ""
mathjax-support = true
git-repository-url = "https://github.com/saifmukhtar/kinetic"
edit-url-template = "https://github.com/saifmukhtar/kinetic/edit/main/docs/src/{path}"

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30
use-boolean-and = true

[output.html.fold]
enable = true
level = 0
