name: Build and Release Binaries

on:
  release:
    types: [created]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: kinetic-daemon
            asset_name: kinetic-daemon-linux
            cli_artifact: kinetic-cli
            cli_asset: kinetic-cli-linux
            node_artifact: kinetic-node
            node_asset: kinetic-node-linux
          - os: macos-latest
            artifact_name: kinetic-daemon
            asset_name: kinetic-daemon-macos
            cli_artifact: kinetic-cli
            cli_asset: kinetic-cli-macos
            node_artifact: kinetic-node
            node_asset: kinetic-node-macos
          - os: windows-latest
            artifact_name: kinetic-daemon.exe
            asset_name: kinetic-daemon-windows.exe
            cli_artifact: kinetic-cli.exe
            cli_asset: kinetic-cli-windows.exe
            node_artifact: kinetic-node.exe
            node_asset: kinetic-node-windows.exe

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install MPIR (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        cd kinetic-vdf/chiavdf
        git clone https://github.com/Chia-Network/mpir_gc_x64.git

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: sudo apt-get update && sudo apt-get install -y libgmp-dev clang libclang-dev

    - name: Install dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: brew install gmp

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Build Kinetic UI
      run: |
        cd kinetic-ui
        npm install
        npm run build

    - name: Build Kinetic Daemon (Release)
      run: cargo build --release -p kinetic-daemon

    - name: Build Kinetic CLI (Release)
      run: cargo build --release -p kinetic-cli

    - name: Build Kinetic Node (Release)
      run: cargo build --release -p kinetic-node

    - name: Rename Binaries for Release
      shell: bash
      run: |
        cp target/release/${{ matrix.artifact_name }} target/release/${{ matrix.asset_name }}
        cp target/release/${{ matrix.cli_artifact }} target/release/${{ matrix.cli_asset }}
        cp target/release/${{ matrix.node_artifact }} target/release/${{ matrix.node_asset }}

    - name: Upload Binary to Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          target/release/${{ matrix.asset_name }}
          target/release/${{ matrix.cli_asset }}
          target/release/${{ matrix.node_asset }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
